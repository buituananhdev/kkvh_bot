name: Gui Gia Vang Telegram

on:
  schedule:
    # Máy chủ GitHub dùng múi giờ UTC. Giờ VN (UTC+7) = Giờ UTC + 7.
    # Đã dời lịch chạy sớm hơn 1 tiếng so với giờ dự kiến để bù trừ delay.
    - cron: '0 0 * * *'    # Dự kiến chạy lúc 07:00 VN (để nhận tin tầm 08:00)
    - cron: '30 1 * * *'   # Dự kiến chạy lúc 08:30 VN (để nhận tin tầm 09:30)
    - cron: '0 3 * * *'    # Dự kiến chạy lúc 10:00 VN (để nhận tin tầm 11:00)
    - cron: '30 4 * * *'   # Dự kiến chạy lúc 11:30 VN (để nhận tin tầm 12:30)
    - cron: '0 6 * * *'    # Dự kiến chạy lúc 13:00 VN (để nhận tin tầm 14:00)
    - cron: '30 7 * * *'   # Dự kiến chạy lúc 14:30 VN (để nhận tin tầm 15:30)
    - cron: '0 9 * * *'    # Dự kiến chạy lúc 16:00 VN (để nhận tin tầm 17:00)
    - cron: '30 10 * * *'  # Dự kiến chạy lúc 17:30 VN (để nhận tin tầm 18:30)
    - cron: '0 12 * * *'   # Dự kiến chạy lúc 19:00 VN (để nhận tin tầm 20:00)
    - cron: '30 13 * * *'  # Dự kiến chạy lúc 20:30 VN (để nhận tin tầm 21:30)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Cai dat Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Cai dat thu vien
        run: pip install -r requirements.txt
        
      - name: Chay script Python
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python gold_price_bot.py
